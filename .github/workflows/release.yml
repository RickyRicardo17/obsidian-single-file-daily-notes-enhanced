name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22.x"

            - name: Build plugin
              run: |
                  npm install
                  npm run build

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  tag="${GITHUB_REF#refs/tags/}"
                  base=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
                  if [ -z "$base" ]; then
                    base="1.4.1"
                  fi
                  repo="${{ github.repository }}"
                  url="https://github.com/${repo}/compare/${base}...${tag}"
                  notes="[Changes](${url})"

                  gh release create "$tag" \
                    --title="$tag" \
                    --notes="$notes" \
                    main.js manifest.json styles.css
